<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Geometry Dash Style Game</title>
<style>
    body {
        margin: 0;
        overflow: hidden;
        background: #111;
        font-family: Arial, sans-serif;
    }

    canvas {
        display: block;
        background: linear-gradient(#1e1e1e, #0f0f0f);
    }

    #ui {
        position: absolute;
        top: 10px;
        left: 10px;
        color: white;
        z-index: 10;
        font-size: 20px;
    }
</style>
</head>
<body>
<div id="ui">Press SPACE to Jump</div>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const gravity = 0.8;
const jumpForce = -14;
const groundHeight = 100;

let gameSpeed = 6;
let cameraX = 0;
let gameOver = false;
let win = false;

const player = {
    x: 150,
    y: canvas.height - groundHeight - 50,
    width: 50,
    height: 50,
    velocityY: 0,
    grounded: true,
    rotation: 0
};

const levelLength = 5000;

const obstacles = [
    {x: 500, width: 60, height: 60},
    {x: 800, width: 60, height: 120},
    {x: 1200, width: 60, height: 80},
    {x: 1600, width: 60, height: 160},
    {x: 2000, width: 60, height: 60},
    {x: 2400, width: 60, height: 140},
    {x: 2800, width: 60, height: 80},
    {x: 3300, width: 60, height: 180},
    {x: 3800, width: 60, height: 100},
    {x: 4300, width: 60, height: 200}
];

        ctx.moveTo(x, y + obs.height);
        ctx.lineTo(x + obs.width / 2, y);
        ctx.lineTo(x + obs.width, y + obs.height);
        ctx.closePath();
        ctx.fill();
    }
}

function drawProgress() {
    const percent = Math.min((cameraX / levelLength) * 100, 100);

    ctx.fillStyle = "white";
    ctx.font = "24px Arial";
    ctx.fillText(`Progress: ${Math.floor(percent)}%`, 20, 50);
}

function drawGameOver() {
    ctx.fillStyle = "white";
    ctx.font = "60px Arial";
    ctx.fillText("GAME OVER", canvas.width / 2 - 200, canvas.height / 2);

    ctx.font = "30px Arial";
    ctx.fillText("Press SPACE to Restart", canvas.width / 2 - 180, canvas.height / 2 + 60);
}

function drawWin() {
    ctx.fillStyle = "#00ff99";
    ctx.font = "60px Arial";
    ctx.fillText("LEVEL COMPLETE!", canvas.width / 2 - 250, canvas.height / 2);

    ctx.font = "30px Arial";
    ctx.fillText("Press SPACE to Play Again", canvas.width / 2 - 200, canvas.height / 2 + 60);
}

function gameLoop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    update();

    drawGround();
    drawPlayer();
    drawObstacles();
    drawProgress();

    if (gameOver) {
        drawGameOver();
    }

    if (win) {
        drawWin();
    }

    requestAnimationFrame(gameLoop);
}

gameLoop();

window.addEventListener("resize", () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});
</script>
</body>
</html>
