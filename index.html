<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cube Rush</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: linear-gradient(to bottom, #101820, #1b2a41);
      overflow: hidden;
      color: white;
    }

    canvas {
      display: block;
      margin: 0 auto;
      background: linear-gradient(to bottom, #1c2541, #3a506b);
      border-bottom: 6px solid #5bc0be;
    }

    #ui {
      position: absolute;
      top: 15px;
      width: 100%;
      text-align: center;
      z-index: 10;
      pointer-events: none;
    }

    #title {
      font-size: 42px;
      font-weight: bold;
      color: #5bc0be;
      text-shadow: 0 0 15px #5bc0be;
    }

    #score {
      font-size: 24px;
      margin-top: 8px;
    }

    #instructions {
      margin-top: 8px;
      font-size: 16px;
      opacity: 0.8;
    }

    #gameOver {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      display: none;
      z-index: 20;
    }

    #gameOver h1 {
      font-size: 64px;
      color: #ff595e;
      text-shadow: 0 0 20px #ff595e;
    }

    #gameOver p {
      margin-top: 10px;
      font-size: 22px;
    }

    button {
      margin-top: 20px;
      padding: 12px 28px;
      border: none;
      border-radius: 10px;
      background: #5bc0be;
      color: #111;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s ease;
      pointer-events: auto;
    }

    button:hover {
      transform: scale(1.08);
      background: #6fffe9;
    }
  </style>
</head>
<body>
  <div id="ui">
    <div id="title">CUBE RUSH</div>
    <div id="score">Score: 0</div>
    <div id="instructions">Press SPACE, W, ↑ or CLICK to jump</div>
  </div>

  <div id="gameOver">
    <h1>GAME OVER</h1>
    <p id="finalScore">Score: 0</p>
    <button onclick="restartGame()">Restart</button>
  </div>

  <canvas id="gameCanvas"></canvas>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const gravity = 0.8;
    const groundHeight = 120;

    let gameSpeed = 7;
    let score = 0;
    let gameRunning = true;

    const player = {
      x: 150,
      y: canvas.height - groundHeight - 50,
      width: 50,
      height: 50,
      velocityY: 0,
      jumping: false,
      rotation: 0
    };

    const obstacles = [];
    const particles = [];

    function jump() {
      if (!player.jumping && gameRunning) {
        player.velocityY = -16;
        player.jumping = true;
      }
    }

    document.addEventListener('keydown', (e) => {
      if (["Space", "ArrowUp", "KeyW"].includes(e.code)) {
        jump();
      }
    });

    document.addEventListener('mousedown', jump);
    document.addEventListener('touchstart', jump);

    function createObstacle() {
      const size = Math.random() * 40 + 40;

      obstacles.push({
        x: canvas.width + size,
        y: canvas.height - groundHeight - size,
        width: size,
        height: size
      });
    }

    function createParticles(x, y) {
      for (let i = 0; i < 15; i++) {
        particles.push({
          x,
          y,
          radius: Math.random() * 5 + 2,
          velocityX: (Math.random() - 0.5) * 8,
          velocityY: (Math.random() - 0.5) * 8,
          life: 60
        });
      }
    }

    function drawPlayer() {
      ctx.save();
      ctx.translate(player.x + player.width / 2, player.y + player.height / 2);
      ctx.rotate(player.rotation);

      ctx.fillStyle = '#6fffe9';
      ctx.shadowColor = '#6fffe9';
      ctx.shadowBlur = 15;
      ctx.fillRect(-player.width / 2, -player.height / 2, player.width, player.height);

      ctx.fillStyle = '#0b132b';
      ctx.fillRect(-10, -10, 8, 8);
      ctx.fillRect(5, -10, 8, 8);

      ctx.restore();
    }

    function drawGround() {
      ctx.fillStyle = '#5bc0be';
      ctx.fillRect(0, canvas.height - groundHeight, canvas.width, groundHeight);

      ctx.fillStyle = '#6fffe9';

      for (let i = 0; i < canvas.width; i += 60) {
        ctx.fillRect((i - (score * 2 % 60)), canvas.height - groundHeight + 20, 30, 6);
      }
    }

    function drawObstacles() {
      ctx.fillStyle = '#ff595e';
      ctx.shadowColor = '#ff595e';
      ctx.shadowBlur = 15;

      obstacles.forEach(obstacle => {
        ctx.beginPath();
        ctx.moveTo(obstacle.x, obstacle.y + obstacle.height);
        ctx.lineTo(obstacle.x + obstacle.width / 2, obstacle.y);
        ctx.lineTo(obstacle.x + obstacle.width, obstacle.y + obstacle.height);
        ctx.closePath();
        ctx.fill();
      });

      ctx.shadowBlur = 0;
    }

    function updatePlayer() {
      player.velocityY += gravity;
      player.y += player.velocityY;

      if (player.jumping) {
        player.rotation += 0.12;
      }

      const floor = canvas.height - groundHeight - player.height;

      if (player.y >= floor) {
        player.y = floor;
        player.velocityY = 0;
        player.jumping = false;
        player.rotation = 0;
      }
    }

    function updateObstacles() {
      obstacles.forEach((obstacle, index) => {
        obstacle.x -= gameSpeed;

        if (
          player.x < obstacle.x + obstacle.width &&
          player.x + player.width > obstacle.x &&
          player.y < obstacle.y + obstacle.height &&
          player.y + player.height > obstacle.y
        ) {
          endGame();
        }

        if (obstacle.x + obstacle.width < 0) {
          obstacles.splice(index, 1);
          score++;
          document.getElementById('score').textContent = `Score: ${score}`;

          if (score % 5 === 0) {
            gameSpeed += 0.5;
          }
        }
      });
    }

    function updateParticles() {
      particles.forEach((particle, index) => {
        particle.x += particle.velocityX;
        particle.y += particle.velocityY;
        particle.life--;

        ctx.beginPath();
        ctx.arc(particle.x, particle.y, particle.radius, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(111,255,233,${particle.life / 60})`;
        ctx.fill();

        if (particle.life <= 0) {
          particles.splice(index, 1);
        }
      });
    }

    function drawBackground() {
      for (let i = 0; i < 50; i++) {
        ctx.fillStyle = 'rgba(255,255,255,0.08)';
        ctx.fillRect((i * 200 - (score * 0.5 % 200)), (i * 70) % canvas.height, 4, 4);
      }
    }

    function endGame() {
      gameRunning = false;
      createParticles(player.x + player.width / 2, player.y + player.height / 2);

      document.getElementById('gameOver').style.display = 'block';
      document.getElementById('finalScore').textContent = `Score: ${score}`;
    }

    function restartGame() {
      obstacles.length = 0;
      particles.length = 0;

      player.y = canvas.height - groundHeight - player.height;
      player.velocityY = 0;
      player.rotation = 0;
      player.jumping = false;

      score = 0;
      gameSpeed = 7;
      gameRunning = true;

      document.getElementById('score').textContent = 'Score: 0';
      document.getElementById('gameOver').style.display = 'none';

      animate();
    }

    let obstacleTimer = 0;

    function animate() {
      if (!gameRunning) {
        updateParticles();
        return;
      }

      requestAnimationFrame(animate);

      ctx.clearRect(0, 0, canvas.width, canvas.height);

      drawBackground();
      drawGround();

      updatePlayer();
      drawPlayer();

      updateObstacles();
      drawObstacles();

      updateParticles();

      obstacleTimer++;

      if (obstacleTimer > 90) {
        createObstacle();
        obstacleTimer = Math.random() * 40;
      }
    }

    animate();

    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    });
  </script>
</body>
</html>
