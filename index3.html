<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Geometry Dash Style Engine</title>
<style>
html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: #0f0f0f;
}
canvas {
    display: block;
}
#ui {
    position: absolute;
    top: 10px;
    left: 10px;
    color: white;
    font-family: Arial;
}
</style>
</head>

<body>
<div id="ui">
SPACE = Jump | R = Restart | E = Add Spike (Editor)
</div>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

// ----------------------
// PLAYER
// ----------------------
const player = {
    x: 150,
    y: 0,
    vy: 0,
    size: 40,
    grounded: false
};

const gravity = 0.75;
const jumpPower = -14;

// ----------------------
// CAMERA
// ----------------------
let cameraX = 0;
let speed = 5;

// ----------------------
// LEVEL DATA
// ----------------------
let spikes = [
    {x: 600, w: 40, h: 40},
    {x: 900, w: 40, h: 40},
    {x: 1200, w: 40, h: 40},
    {x: 1600, w: 40, h: 40},
    {x: 2000, w: 40, h: 40}
];

const groundHeight = 100;

// ----------------------
// GAME STATE
// ----------------------
let gameOver = false;

// ----------------------
// INPUT
// ----------------------
function jump(){
    if (!gameOver && player.grounded) {
        player.vy = jumpPower;
        player.grounded = false;
    }
    if (gameOver) reset();
}

function reset(){
    player.y = canvas.height - groundHeight - player.size;
    player.vy = 0;
    cameraX = 0;
    gameOver = false;
}

window.addEventListener("keydown", e => {
    if (e.code === "Space") jump();
    if (e.code === "KeyR") reset();

    // Editor mode: add spike where camera is
    if (e.code === "KeyE") {
        spikes.push({
            x: cameraX + canvas.width,
            w: 40,
            h: 40
        });
    }
});

window.addEventListener("mousedown", jump);

// ----------------------
// UPDATE
// ----------------------
function update(){

    if (gameOver) return;

    cameraX += speed;

    // gravity
    player.vy += gravity;
    player.y += player.vy;

    let groundY = canvas.height - groundHeight - player.size;

    if (player.y >= groundY) {
        player.y = groundY;
        player.vy = 0;
        player.grounded = true;
    }

    // collision with spikes
    for (let s of spikes) {
        let sx = s.x - cameraX;
        let sy = canvas.height - groundHeight - s.h;

        if (
            player.x < sx + s.w &&
            player.x + player.size > sx &&
            player.y < sy + s.h &&
            player.y + player.size > sy
        ) {
            gameOver = true;
        }
    }
}

// ----------------------
// DRAW
// ----------------------
function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    let groundY = canvas.height - groundHeight;

    // ground
    ctx.fillStyle = "#222";
    ctx.fillRect(0, groundY, canvas.width, groundHeight);

    // spikes
    ctx.fillStyle = "#ff0055";
    for (let s of spikes) {
        let x = s.x - cameraX;
        let y = groundY - s.h;

        ctx.beginPath();
        ctx.moveTo(x, y + s.h);
        ctx.lineTo(x + s.w/2, y);
        ctx.lineTo(x + s.w, y + s.h);
        ctx.closePath();
        ctx.fill();
    }

    // player
    ctx.fillStyle = "#00ffff";
    ctx.fillRect(player.x, player.y, player.size, player.size);

    // UI
    ctx.fillStyle = "white";
    ctx.font = "18px Arial";
    ctx.fillText("Distance: " + Math.floor(cameraX), 20, 30);

    if (gameOver) {
        ctx.font = "50px Arial";
        ctx.fillText("GAME OVER", canvas.width/2 - 150, canvas.height/2);
        ctx.font = "20px Arial";
        ctx.fillText("Press R or SPACE", canvas.width/2 - 100, canvas.height/2 + 40);
    }
}

// ----------------------
// LOOP
// ----------------------
function loop(){
    update();
    draw();
    requestAnimationFrame(loop);
}

reset();
loop();

</script>

</body>
</html>
